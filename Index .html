<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      background: linear-gradient(130deg,pink, green);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      text-align: center;
    }

    .login-box h2 {
      margin-bottom: 20px;
    }

    .input-box {
      margin-bottom: 15px;
      text-align: left;
    }

    .input-box label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .input-box input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
      outline: none;
    }

    .input-box input:focus {
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #667eea;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #5a67d8;
    }

    .error {
      color: red;
      margin-top: 10px;
      font-size: 14px;
    }

    .success {
      color: green;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Login</h2>

    <div class="input-box">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username">
    </div>

    <div class="input-box">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password">
    </div>

    <button onclick="login()">Login</button>

    <div id="message"></div>
  </div>

  <script>
    function login() {
      let user = document.getElementById("username").value;
      let pass = document.getElementById("password").value;
      let message = document.getElementById("message");

      // Simple validation
      if (user === "" || pass === "") {
        message.innerHTML = "<p class='error'>Please fill all fields</p>";
      }
      else if (user === "admin" && pass === "1234") {
        message.innerHTML = "<p class='success'>Login Successful ✅</p>";
      }
      else {
        message.innerHTML = "<p class='error'>Invalid Username or Password ❌</p>";
      }
    }
  </script>

</body>
</html>
